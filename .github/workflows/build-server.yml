name: Build Server Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compile sync service
        run: |
          npm ci
          npx tsc -p sync/tsconfig.service.json

      - name: Build SportLink Server GUI
        working-directory: server-app
        run: |
          npm ci
          npm run compile
          npx electron-builder --config electron-builder.server.yml --win portable --x64 --publish never

      - name: Install InnoSetup
        run: choco install innosetup -y

      - name: Compile installer
        run: iscc sync/installer.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-server
          path: release/SportLinkServer-Setup-*.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download server artifact
        uses: actions/download-artifact@v4
        with:
          name: build-server
          path: artifacts

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
