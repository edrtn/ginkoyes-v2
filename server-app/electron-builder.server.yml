appId: com.ginkoyes.serveur
productName: Ginkoyes Serveur
directories:
  output: release
files:
  - dist/**/*
  - renderer/**/*
  - package.json
extraResources:
  - from: renderer
    to: renderer
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: null
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  artifactName: "Ginkoyes Serveur Setup ${version}.exe"
