<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportLink Server</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>SportLink Server</h1>
    <button id="btn-refresh" title="Rafraichir">Rafraichir</button>
  </header>

  <main>
    <div class="row">
      <!-- Card Service -->
      <div class="card">
        <h2>Service</h2>
        <div class="field">
          <span class="label">Etat :</span>
          <span id="service-status" class="badge badge-unknown">--</span>
        </div>
        <div class="field">
          <span class="label">Prochaine sync :</span>
          <span id="next-sync">--</span>
        </div>
      </div>

      <!-- Card VPN -->
      <div class="card">
        <h2>VPN Tailscale</h2>
        <div class="field">
          <span class="label">Etat :</span>
          <span id="vpn-status" class="badge badge-unknown">--</span>
        </div>
        <div class="field">
          <span class="label">IP :</span>
          <span id="vpn-ip">--</span>
        </div>
        <div class="field">
          <span class="label">Cle :</span>
          <input type="text" id="vpn-key-input" placeholder="tskey-auth-..." />
        </div>
        <button id="btn-save-key">Enregistrer</button>
      </div>
    </div>

    <div class="row">
      <!-- Card Derniere Sync -->
      <div class="card">
        <h2>Derniere synchronisation</h2>
        <div class="field">
          <span class="label">Date :</span>
          <span id="sync-date">--</span>
        </div>
        <div class="field">
          <span class="label">Duree :</span>
          <span id="sync-duration">--</span>
        </div>
        <div class="field">
          <span class="label">Lignes :</span>
          <span id="sync-rows">--</span>
        </div>
        <div class="field">
          <span class="label">Statut :</span>
          <span id="sync-result" class="badge badge-unknown">--</span>
        </div>
        <button id="btn-sync">Lancer sync</button>
      </div>

      <!-- Card Historique -->
      <div class="card">
        <h2>Historique</h2>
        <table id="sync-history">
          <thead>
            <tr>
              <th>Date</th>
              <th>Statut</th>
              <th>Lignes</th>
              <th>Duree</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Card Journal -->
    <div class="card card-full">
      <h2>Journal</h2>
      <pre id="log-output"></pre>
    </div>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
