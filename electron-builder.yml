appId: com.sportlink.app
productName: SportLink
directories:
  output: release
  buildResources: build

# Auto-update : publier les releases sur GitHub
publish:
  provider: github
  owner: edrtn
  repo: ginkoyes-v2

# esbuild bundle tout dans dist-electron → pas besoin de node_modules
files:
  - dist-electron/**/*
  - "!node_modules"

extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
  - from: .next/static
    to: standalone/.next/static
    filter:
      - "**/*"
  - from: public
    to: standalone/public
    filter:
      - "**/*"
asar: true

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  icon: build/icon.icns
  category: public.app-category.business
  identity: "Developer ID Application: Edward Renton (48W4C7B48Z)"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
