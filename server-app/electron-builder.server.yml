appId: com.sportlink.server
productName: SportLink Server
directories:
  output: release
files:
  - dist/**/*
  - renderer/**/*
  - package.json
extraResources:
  - from: renderer
    to: renderer
  - from: ../sync/dist
    to: sync/dist
  - from: ../sync/sync-config.json
    to: sync/sync-config.json
  - from: ../sql
    to: sql
    filter:
      - "*.sql"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: null
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  artifactName: "SportLink Server Setup ${version}.exe"
