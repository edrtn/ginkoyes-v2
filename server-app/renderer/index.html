<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportLink Server</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>SportLink Server</h1>
    <button id="btn-refresh" title="Rafraichir">Rafraichir</button>
  </header>

  <main>
    <div class="row">
      <!-- Card Service -->
      <div class="card">
        <h2>Service</h2>
        <div class="field">
          <span class="label">Etat :</span>
          <span id="service-status" class="badge badge-unknown">--</span>
        </div>
        <div class="field">
          <span class="label">Prochaine sync :</span>
          <span id="next-sync">--</span>
        </div>
      </div>

      <!-- Card Tunnel SSH -->
      <div class="card">
        <h2>Tunnel SSH</h2>
        <div class="field">
          <label for="tunnel-vps-host">VPS Host</label>
          <input type="text" id="tunnel-vps-host" placeholder="85.215.176.58">
        </div>
        <div class="field">
          <label for="tunnel-vps-port">Port SSH</label>
          <input type="number" id="tunnel-vps-port" value="22">
        </div>
        <div class="field">
          <label for="tunnel-ssh-user">Utilisateur SSH</label>
          <input type="text" id="tunnel-ssh-user" placeholder="tunnel">
        </div>
        <div class="field">
          <label for="tunnel-remote-port">Port distant</label>
          <input type="number" id="tunnel-remote-port" value="3307">
        </div>
        <div class="field">
          <label for="tunnel-private-key">Cle privee</label>
          <textarea id="tunnel-private-key" rows="4" placeholder="-----BEGIN OPENSSH PRIVATE KEY-----"></textarea>
        </div>
        <button id="btn-save-tunnel">Enregistrer</button>
        <span id="tunnel-save-status" style="display:none; margin-left:8px; color:green; font-size:0.85em;">Sauvegarde !</span>
      </div>

    </div>

    <div class="row">
      <!-- Card Derniere Sync -->
      <div class="card">
        <h2>Derniere synchronisation</h2>
        <div class="field">
          <span class="label">Date :</span>
          <span id="sync-date">--</span>
        </div>
        <div class="field">
          <span class="label">Duree :</span>
          <span id="sync-duration">--</span>
        </div>
        <div class="field">
          <span class="label">Lignes :</span>
          <span id="sync-rows">--</span>
        </div>
        <div class="field">
          <span class="label">Statut :</span>
          <span id="sync-result" class="badge badge-unknown">--</span>
        </div>
        <button id="btn-sync">Lancer sync</button>
      </div>

      <!-- Card Historique -->
      <div class="card">
        <h2>Historique</h2>
        <table id="sync-history">
          <thead>
            <tr>
              <th>Date</th>
              <th>Statut</th>
              <th>Lignes</th>
              <th>Duree</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Card Journal -->
    <div class="card card-full">
      <h2>Journal</h2>
      <pre id="log-output"></pre>
    </div>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
